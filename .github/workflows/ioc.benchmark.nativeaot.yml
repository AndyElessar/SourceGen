name: SourceGen.Ioc Benchmark NativeAOT

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'src/Ioc/src/SourceGen.Ioc/**'
      - 'src/Ioc/src/SourceGen.Ioc.SourceGenerator/**'
      - 'src/Ioc/test/SourceGen.Ioc.Benchmark/**'
      - 'src/Directory.Build.props'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/ioc.benchmark.nativeaot.yml'

  pull_request:
    branches: [main]
    paths:
      - 'src/Ioc/src/SourceGen.Ioc/**'
      - 'src/Ioc/src/SourceGen.Ioc.SourceGenerator/**'
      - 'src/Ioc/test/SourceGen.Ioc.Benchmark/**'
      - 'src/Directory.Build.props'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/ioc.benchmark.nativeaot.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  nativeaot-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install NativeAOT prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore benchmark project
        run: dotnet restore src/Ioc/test/SourceGen.Ioc.Benchmark/SourceGen.Ioc.Benchmark.csproj

      - name: Run ThreadSafeStrategy and RealisticApp benchmarks (NativeAOT)
        run: |
          dotnet run \
            --project src/Ioc/test/SourceGen.Ioc.Benchmark/SourceGen.Ioc.Benchmark.csproj \
            -c Release \
            -f net10.0 \
            -- \
            --runtimes nativeaot10.0 \
            --filter "*ThreadSafeStrategyBenchmark*" "*RealisticAppBenchmark*"

      - name: Publish benchmark summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          results_dir="src/Ioc/test/SourceGen.Ioc.Benchmark/BenchmarkDotNet.Artifacts/results"

          {
            echo "## NativeAOT Benchmark Summary"
            echo
            echo "- Runtime: \`nativeaot10.0\`"
            echo "- Filters: \`*ThreadSafeStrategyBenchmark*\`, \`*RealisticAppBenchmark*\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ ! -d "$results_dir" ]]; then
            echo "Benchmark results directory not found: \`$results_dir\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          shopt -s nullglob
          reports=(
            "$results_dir"/*ThreadSafeStrategyBenchmark*-report-github.md
            "$results_dir"/*RealisticAppBenchmark*-report-github.md
          )

          if [[ ${#reports[@]} -eq 0 ]]; then
            reports=("$results_dir"/*-report-github.md)
          fi

          if [[ ${#reports[@]} -eq 0 ]]; then
            echo "No \`*-report-github.md\` files were produced." >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "Available files in \`$results_dir\`:" >> "$GITHUB_STEP_SUMMARY"
            find "$results_dir" -maxdepth 1 -type f -printf -- "- %f\\n" >> "$GITHUB_STEP_SUMMARY" || true
            exit 0
          fi

          for report in "${reports[@]}"; do
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "### $(basename "$report")" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            cat "$report" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload BenchmarkDotNet artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ioc-benchmark-nativeaot-${{ github.run_id }}
          path: src/Ioc/test/SourceGen.Ioc.Benchmark/BenchmarkDotNet.Artifacts
          if-no-files-found: warn
          retention-days: 7
