name: SourceGen.Ioc

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'src/SourceGen.Ioc/**'
      - 'src/SourceGen.Ioc.SourceGenerator/**'
      - 'tests/SourceGen.Ioc.Test/**'
    tags:
      - 'ioc-v*'
  pull_request:
    branches: [main]
    paths:
      - 'src/SourceGen.Ioc/**'
      - 'src/SourceGen.Ioc.SourceGenerator/**'
      - 'tests/SourceGen.Ioc.Test/**'

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test tests/SourceGen.Ioc.Test/SourceGen.Ioc.Test.csproj --no-build -c Release --verbosity normal

  pack:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Pack SourceGen.Ioc
        run: dotnet pack src/SourceGen.Ioc/SourceGen.Ioc.csproj --no-build -c Release -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sourcegen-ioc-nuget
          path: ./artifacts/*.nupkg
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: pack
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/ioc-v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: sourcegen-ioc-nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
