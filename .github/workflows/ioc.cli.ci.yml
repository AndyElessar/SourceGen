name: SourceGen.Ioc.Cli CI

on:
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - 'src/Ioc/src/SourceGen.Ioc.Cli/**'
      - 'src/Ioc/test/SourceGen.Ioc.Cli.Test/**'
      - 'src/Ioc/test/Directory.Build.props'
      - 'src/Directory.Build.props'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/ioc.cli.ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/Ioc/src/SourceGen.Ioc.Cli/**'
      - 'src/Ioc/test/SourceGen.Ioc.Cli.Test/**'
      - 'src/Ioc/test/Directory.Build.props'
      - 'src/Directory.Build.props'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - '.github/workflows/ioc.cli.ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet run --project src/Ioc/test/SourceGen.Ioc.Cli.Test/SourceGen.Ioc.Cli.Test.csproj -c Release --no-build
