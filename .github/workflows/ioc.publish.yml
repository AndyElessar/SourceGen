name: SourceGen.Ioc Publish

on:
  push:
    tags:
      - 'ioc-v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet run --project src/Ioc/test/SourceGen.Ioc.Test/SourceGen.Ioc.Test.csproj -c Release --no-build

      - name: Pack SourceGen.Ioc
        run: dotnet pack src/Ioc/src/SourceGen.Ioc/SourceGen.Ioc.csproj --no-build -c Release -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sourcegen-ioc-nuget
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    environment:
      name: nuget-publish

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: sourcegen-ioc-nuget
          path: ./artifacts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

  release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: sourcegen-ioc-nuget
          path: ./artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release create "$TAG" ./artifacts/*.nupkg --generate-notes --title "$TAG" --repo "$REPO"
